---
- name: Set home directory path
  ansible.builtin.set_fact:
    user_home: "{{ lookup('env', 'HOME') if ansible_os_family == 'Darwin' else '/home/' + user }}"
  tags:
    - dotfiles

- name: Set dotfiles repos
  ansible.builtin.set_fact:
    dotfiles_shared_repo: "https://github.com/stivce-devops-dude/dotfiles.git"
    dotfiles_os_repo: "{{ dotfiles_os_repo_map[ansible_os_family] }}"
  tags:
    - dotfiles

- name: Ensure dotfiles bare repo directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.dotfiles"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0700'
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  tags:
    - dotfiles

- name: Clone bare dotfiles repo
  ansible.builtin.git:
    repo: "{{ dotfiles_shared_repo }}"
    dest: "{{ user_home }}/.dotfiles"
    bare: yes
    clone: yes
    update: yes
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  tags:
    - dotfiles

- name: Get list of dotfiles to link
  ansible.builtin.command:
    cmd: git --git-dir={{ user_home }}/.dotfiles ls-tree -r --name-only HEAD
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  register: dotfiles_list
  changed_when: false
  tags:
    - dotfiles

- name: Remove existing files/dirs and symlink dotfiles
  ansible.builtin.shell: |
    cd "{{ user_home }}"
    for file in $(git --git-dir=.dotfiles ls-tree -r --name-only HEAD); do
      target=".dotfiles/$file"
      # Remove existing file/dir/symlink if exists
      if [[ -e "$file" || -L "$file" ]]; then
        rm -rf "$file"
      fi
      # Create parent dir if needed
      mkdir -p "$(dirname "$file")"
      # Symlink
      ln -s "$target" "$file"
    done
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  changed_when: true
  tags:
    - dotfiles

- name: Ensure OS dotfiles bare repo exists
  ansible.builtin.file:
    path: "{{ user_home }}/.dotfiles-os"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0700'
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  tags:
    - dotfiles

- name: Clone OS-specific bare dotfiles repo
  ansible.builtin.git:
    repo: "{{ dotfiles_os_repo }}"
    dest: "{{ user_home }}/.dotfiles-os"
    bare: yes
    clone: yes
    update: yes
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  tags:
    - dotfiles

- name: Remove existing files/dirs and symlink OS dotfiles
  ansible.builtin.shell: |
    cd "{{ user_home }}"
    for file in $(git --git-dir=.dotfiles-os ls-tree -r --name-only HEAD); do
      target=".dotfiles-os/$file"
      if [[ -e "$file" || -L "$file" ]]; then
        rm -rf "$file"
      fi
      mkdir -p "$(dirname "$file")"
      ln -s "$target" "$file"
    done
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  changed_when: true
  tags:
    - dotfiles

- name: Apply Zen Browser preferences
  ansible.builtin.command: "{{ user_home }}/.local/bin/zen-apply-prefs"
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  when:
    - ansible_os_family == "Archlinux"
    - not ansible_check_mode
  changed_when: true
  tags:
    - dotfiles