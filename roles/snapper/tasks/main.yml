---
- name: Install snapper and snap-pac
  community.general.pacman:
    name:
      - snapper
      - snap-pac
      - grub-btrfs
      - inotify-tools
    state: present

- name: Check if snapper root config exists
  ansible.builtin.stat:
    path: /etc/snapper/configs/root
  register: snapper_root_config

- name: Create snapper root config
  ansible.builtin.command: snapper -c root create-config /
  when: not snapper_root_config.stat.exists
  changed_when: true

- name: Allow wheel group to manage snapshots
  ansible.builtin.lineinfile:
    path: /etc/snapper/configs/root
    regexp: '^ALLOW_GROUPS='
    line: 'ALLOW_GROUPS="wheel"'

- name: Set snapshot retention limits
  ansible.builtin.lineinfile:
    path: /etc/snapper/configs/root
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}=\"{{ item.value }}\""
  loop:
    - { key: TIMELINE_LIMIT_HOURLY,  value: "{{ snapper_timeline_limit_hourly }}" }
    - { key: TIMELINE_LIMIT_DAILY,   value: "{{ snapper_timeline_limit_daily }}" }
    - { key: TIMELINE_LIMIT_WEEKLY,  value: "{{ snapper_timeline_limit_weekly }}" }
    - { key: TIMELINE_LIMIT_MONTHLY, value: "{{ snapper_timeline_limit_monthly }}" }
    - { key: TIMELINE_LIMIT_YEARLY,  value: "{{ snapper_timeline_limit_yearly }}" }

- name: Enable snapper timers and grub-btrfsd
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - snapper-timeline.timer
    - snapper-cleanup.timer
    - grub-btrfsd
