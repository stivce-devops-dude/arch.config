---
- name: Install CachyOS kernel and headers
  community.general.pacman:
    name:
      - linux-cachyos
      - linux-cachyos-headers
    state: present

- name: Verify CachyOS kernel image exists before removing stock kernel
  ansible.builtin.stat:
    path: /boot/vmlinuz-linux-cachyos
  register: cachyos_kernel

- name: Remove stock Arch kernel
  community.general.pacman:
    name:
      - linux
      - linux-headers
    state: absent
  when: cachyos_kernel.stat.exists

- name: Check if EFISTUB entry already points to CachyOS kernel
  ansible.builtin.shell: efibootmgr -v | grep -q "Arch Speed Meta.*vmlinuz-linux-cachyos"
  register: efi_check
  changed_when: false
  failed_when: false

- name: Detect ESP partition and disk
  ansible.builtin.shell: |
    ESP=$(findmnt -n -o SOURCE /boot)
    echo "disk=$(echo "$ESP" | sed 's/p\?[0-9]*$//')"
    echo "part=$(echo "$ESP" | grep -oP '\d+$')"
  register: esp_info
  changed_when: false
  args:
    executable: /bin/bash

- name: Parse ESP info
  ansible.builtin.set_fact:
    esp_disk: "{{ esp_info.stdout | regex_search('disk=(.+)', '\\1') | first }}"
    esp_part: "{{ esp_info.stdout | regex_search('part=(\\d+)', '\\1') | first }}"

- name: Assert ESP disk and partition were detected
  ansible.builtin.assert:
    that:
      - esp_disk | length > 0
      - esp_part | length > 0
    fail_msg: "Could not detect ESP disk/partition. Is /boot mounted? Check findmnt -n -o SOURCE /boot"

- name: Update EFISTUB entry to use CachyOS kernel
  ansible.builtin.shell: |
    ROOT_UUID=$(blkid -s UUID -o value "$(findmnt -n -o SOURCE /)")
    UCODE=""
    if [[ -f /boot/amd-ucode.img ]]; then
      UCODE="initrd=\\amd-ucode.img "
    elif [[ -f /boot/intel-ucode.img ]]; then
      UCODE="initrd=\\intel-ucode.img "
    fi

    for bootnum in $(efibootmgr -v | grep "Arch Speed Meta" | grep -oP 'Boot\K[0-9A-Fa-f]{4}'); do
      efibootmgr -b "$bootnum" -B
    done

    efibootmgr --create --disk {{ esp_disk }} --part {{ esp_part }} --label "Arch Speed Meta" \
      --loader /vmlinuz-linux-cachyos \
      --unicode "root=UUID=${ROOT_UUID} rw ${UCODE}initrd=\initramfs-linux-cachyos.img quiet loglevel=3 nowatchdog nmi_watchdog=0 rd.luks=0 rd.lvm=0 8250.nr_uarts=0" --verbose
  args:
    executable: /bin/bash
  when: cachyos_kernel.stat.exists and efi_check.rc != 0
  changed_when: true
