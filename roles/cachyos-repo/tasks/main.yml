---
- name: Check if CachyOS repo is already configured
  ansible.builtin.command: grep -q "^\[cachyos" /etc/pacman.conf
  register: cachyos_configured
  changed_when: false
  failed_when: false

- name: Download CachyOS repo installer
  ansible.builtin.get_url:
    url: https://mirror.cachyos.org/cachyos-repo.tar.xz
    dest: /tmp/cachyos-repo.tar.xz
    mode: "0644"
  when: cachyos_configured.rc != 0

- name: Extract CachyOS repo installer
  ansible.builtin.unarchive:
    src: /tmp/cachyos-repo.tar.xz
    dest: /tmp/
    remote_src: true
  when: cachyos_configured.rc != 0

- name: Run CachyOS repo installer
  ansible.builtin.shell: |
    cd /tmp/cachyos-repo
    yes | ./cachyos-repo.sh
  args:
    executable: /bin/bash
  when: cachyos_configured.rc != 0
  changed_when: true

- name: Clean up CachyOS installer files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/cachyos-repo.tar.xz
    - /tmp/cachyos-repo
  when: cachyos_configured.rc != 0

- name: Update pacman database and upgrade all packages
  community.general.pacman:
    update_cache: true
    upgrade: true
